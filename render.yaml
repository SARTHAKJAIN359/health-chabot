services:
  - type: web
    name: mindspace-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('punkt'); nltk.download('averaged_perceptron_tagger')" && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: gunicorn --timeout 120 --workers 1 --bind 0.0.0.0:10000 app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK
        value: your-secret-key-here
